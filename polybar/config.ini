; =============================================================================
; BLACK METAL COLOR PALETTE (By metalelf0) - Adjusted for Alacritty Harmony
; =============================================================================
[colors]
base00 = #000000   ; Deep black background (Matches your Alacritty bg perfectly)
base01 = #1a1a1a   ; Muted dark gray for subtle background splits (Tray / Media)
base02 = #222222   ; Mid dark gray (Matches your Alacritty selection highlight)
base03 = #333333   ; Bright black (Matches your Alacritty bright black block)
base04 = #999999
base05 = #c1c1c1   ; Stark text foreground (Matches your Alacritty text color)
base06 = #999999
base07 = #c1c1c1
base08 = #5f8787   ; Dried blood red/teal accent
base09 = #aaaaaa
base0a = #a06666
base0b = #dd9999
base0c = #aaaaaa
base0d = #888888
base0e = #999999
base0f = #444444

; =============================================================================
; BAR DEFINITION
; =============================================================================
[bar/mybar]
width = 100%
height = 34
fixed-center = true

background = ${colors.base00}
foreground = ${colors.base05}

; Typography
font-0 = "Hurmit Nerd Font:style=Bold:size=13;3"
font-1 = "monospace:style=Bold:size=13;3"

; Layout
modules-left = xworkspaces custom-scratchpad-indicator custom-playerctl
modules-center = clock-time clock-date
modules-right = pulseaudio network cpu memory temperature battery tray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; =============================================================================
; MODULES LEFT
; =============================================================================
[module/xworkspaces]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true

; Active tab color block (Muted Teal/Grey)
label-focused = " %name% "
label-focused-background = ${colors.base08}
label-focused-foreground = ${colors.base00}
label-focused-padding = 1

; Occupied / Unfocused tabs
label-unfocused = " %name% "
label-unfocused-background = ${colors.base02}
label-unfocused-foreground = ${colors.base05}
label-unfocused-padding = 1

; Urgent tabs
label-urgent = " %name% "
label-urgent-background = ${colors.base0a}
label-urgent-foreground = ${colors.base00}
label-urgent-padding = 1

; Visible but unfocused tabs (e.g. multi-monitor setups)
label-visible = " %name% "
label-visible-background = ${colors.base01}
label-visible-foreground = ${colors.base03}
label-visible-padding = 1

[module/custom-scratchpad-indicator]
type = custom/script
exec = echo " 🗒️ "
interval = 5
format-background = ${colors.base0d}
format-foreground = ${colors.base00}
format-padding = 1

[module/custom-playerctl]
type = custom/script
exec = playerctl metadata --format "{{ artist }} - {{ title }}" 2>/dev/null || echo " No Media "
interval = 2
format-background = ${colors.base01}
format-foreground = ${colors.base04}
format-padding = 1

; =============================================================================
; MODULES CENTER
; =============================================================================
[module/clock-time]
type = internal/date
interval = 1
date = " %H:%M "
format-background = ${colors.base0b}
format-foreground = ${colors.base00}
format-padding = 1

[module/clock-date]
type = internal/date
interval = 60
date = " %a, %b %d "
format-background = ${colors.base02}
format-foreground = ${colors.base05}
format-padding = 1

; =============================================================================
; MODULES RIGHT
; =============================================================================
[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = " Vol: %percentage%% "
label-volume-background = ${colors.base08}
label-volume-foreground = ${colors.base00}
label-volume-padding = 1

format-muted = <label-muted>
label-muted = " Muted "
label-muted-background = ${colors.base02}
label-muted-foreground = ${colors.base0a}
label-muted-padding = 1

[module/network]
type = internal/network
interface = wlan0
interface-type = wireless
interval = 3.0

format-connected = <label-connected>
label-connected = " %essid% "
label-connected-background = ${colors.base02}
label-connected-foreground = ${colors.base05}
label-connected-padding = 1

format-disconnected = <label-disconnected>
label-disconnected = " Disconnected "
label-disconnected-background = ${colors.base0a}
label-disconnected-foreground = ${colors.base00}
label-disconnected-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = " CPU: %percentage%% "
label-background = ${colors.base0e}
label-foreground = ${colors.base00}
label-padding = 1

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = " Mem: %percentage_used%% "
label-background = ${colors.base09}
label-foreground = ${colors.base00}
label-padding = 1

[module/temperature]
type = internal/temperature
interval = 0.5
thermal-zone = 0
warn-temperature = 80

format = <label>
label = " %temperature-c% "
label-background = ${colors.base0c}
label-foreground = ${colors.base00}
label-padding = 1

format-warn = <label-warn>
label-warn = " %temperature-c% "
label-warn-background = ${colors.base0a}
label-warn-foreground = ${colors.base00}
label-warn-padding = 1

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <label-charging>
label-charging = " ⚡ %percentage%% "
label-charging-background = ${colors.base0b}
label-charging-foreground = ${colors.base00}
label-charging-padding = 1

format-discharging = <label-discharging>
label-discharging = " Bat: %percentage%% "
label-discharging-background = ${colors.base0b}
label-discharging-foreground = ${colors.base00}
label-discharging-padding = 1

format-full = <label-full>
label-full = " Power On: %percentage%% "
label-full-background = ${colors.base02}
label-full-foreground = ${colors.base04}
label-full-padding = 1

format-low = <label-low>
label-low = " Bat: %percentage%% "
label-low-background = ${colors.base0a}
label-low-foreground = ${colors.base00}
label-low-padding = 1

[module/tray]
type = internal/tray
tray-position = right
tray-padding = 2
tray-maxsize = 16
tray-background = ${colors.base01}
