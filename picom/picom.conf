backend = "glx";
vsync = true;
glx-use-copysubbuffer-mesa = true;

glx-copy-from-front = true;
glx-swap-method = 2;
xrender-sync = true;
xrender-sync-fence = true;

opacity-rule = [
  # Makes Alacritty 95% opaque when focused...
  "95:class_g = 'kitty' && focused",
  # ... and 40% opaque when not focused.
  "40:class_g = 'kitty' && !focused",
];

corner-radius = 15
